name: scientific_calculator
description: A production-ready scientific calculator app with Material Design 3
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management - Web Compatible
  provider: ^6.1.1
  
  # Math Expression Parser - Web Compatible
  math_expressions: ^2.4.0
  
  # Shared Preferences - Web Compatible (uses localStorage)
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
